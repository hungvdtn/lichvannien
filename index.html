<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lịch Vạn niên AI</title>
    <link rel="icon" type="image/png" href="/logo_amduong.png" />
    <script>
      // Force window.fetch to be configurable or at least trap assignments
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: function() { return originalFetch; },
          set: function() { 
            console.warn('Blocked attempt to overwrite window.fetch');
            return originalFetch; 
          },
          configurable: true,
          enumerable: true
        });
      } catch (e) {
        console.error('Failed to patch window.fetch:', e);
      }

      // Global shim for window.global
      if (typeof window.global === 'undefined') {
        window.global = window;
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
